name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_all:
        description: 'Deploy everything (bypass change detection)'
        type: boolean
        default: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      landings: ${{ steps.changes.outputs.landings }}
      caddyfile: ${{ steps.changes.outputs.caddyfile }}
      migrations: ${{ steps.changes.outputs.migrations }}
      kuzzle: ${{ steps.changes.outputs.kuzzle }}
      monitoring: ${{ steps.changes.outputs.monitoring }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "landings=$(echo "$CHANGED" | grep -q '^landings/' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "caddyfile=$(echo "$CHANGED" | grep -q '^deploy/Caddyfile' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "migrations=$(echo "$CHANGED" | grep -q '^pb_migrations/' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "kuzzle=$(echo "$CHANGED" | grep -q '^deploy/docker-compose.kuzzle.yml' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "monitoring=$(echo "$CHANGED" | grep -q '^deploy/docker-compose.monitoring.yml' && echo true || echo false)" >> "$GITHUB_OUTPUT"

  deploy-landings:
    needs: detect-changes
    if: needs.detect-changes.outputs.landings == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rsync landings to staging
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -azP --delete
          path: landings/
          remote_path: /tmp/landings-staging/
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Move landings to /srv/www/
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            for dir in /tmp/landings-staging/*/; do
              name=$(basename "$dir")
              sudo mkdir -p "/srv/www/$name"
              sudo rsync -a --delete "$dir" "/srv/www/$name/"
            done
            rm -rf /tmp/landings-staging

  deploy-caddyfile:
    needs: detect-changes
    if: needs.detect-changes.outputs.caddyfile == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload Caddyfile
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -azP
          path: deploy/Caddyfile
          remote_path: /tmp/Caddyfile.new
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Validate, backup, and reload Caddy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            sudo mkdir -p /var/log/caddy
            sudo chown caddy:caddy /var/log/caddy
            sudo caddy validate --config /tmp/Caddyfile.new
            sudo cp /etc/caddy/Caddyfile "/etc/caddy/Caddyfile.bak.$(date +%Y%m%d%H%M%S)"
            sudo cp /tmp/Caddyfile.new /etc/caddy/Caddyfile
            sudo chown -R caddy:caddy /var/log/caddy
            sudo systemctl reload caddy
            rm /tmp/Caddyfile.new

  deploy-migrations:
    needs: detect-changes
    if: needs.detect-changes.outputs.migrations == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy PocketBase migrations
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            if [ ! -f /opt/pocketbase/pocketbase ]; then
              echo "⏭ PocketBase not installed — skipping"
              exit 0
            fi
            sudo mkdir -p /opt/pocketbase/instances/obyw/prod/pb_migrations
            sudo mkdir -p /opt/pocketbase/backups
            echo "PocketBase found — ready for rsync"

      - name: Upload migrations
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -azP
          path: pb_migrations/
          remote_path: /tmp/pb-migrations-staging/
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Apply migrations and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            if [ ! -f /opt/pocketbase/pocketbase ]; then
              rm -rf /tmp/pb-migrations-staging
              exit 0
            fi
            sudo rsync -a /tmp/pb-migrations-staging/ /opt/pocketbase/instances/obyw/prod/pb_migrations/
            rm -rf /tmp/pb-migrations-staging
            if systemctl is-active --quiet pocketbase@obyw-prod 2>/dev/null; then
              sudo tar czf "/opt/pocketbase/backups/obyw-prod-$(date +%Y%m%d%H%M%S).tar.gz" \
                /opt/pocketbase/instances/obyw/prod/pb_data/
              sudo systemctl restart pocketbase@obyw-prod
            else
              echo "⏭ pocketbase@obyw-prod not running — migrations copied but not applied"
            fi

  deploy-kuzzle:
    needs: detect-changes
    if: needs.detect-changes.outputs.kuzzle == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload docker-compose
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -azP
          path: deploy/docker-compose.kuzzle.yml
          remote_path: /tmp/docker-compose.kuzzle.yml
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy Kuzzle
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            if ! command -v docker &>/dev/null; then
              echo "⏭ Docker not installed — skipping Kuzzle"
              rm -f /tmp/docker-compose.kuzzle.yml
              exit 0
            fi
            sudo mkdir -p /opt/kuzzle
            sudo mv /tmp/docker-compose.kuzzle.yml /opt/kuzzle/docker-compose.yml
            cd /opt/kuzzle && sudo docker compose up -d

  deploy-monitoring:
    needs: detect-changes
    if: needs.detect-changes.outputs.monitoring == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload monitoring config
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -azP
          path: deploy/docker-compose.monitoring.yml
          remote_path: /tmp/docker-compose.monitoring.yml
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy monitoring
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            if ! command -v docker &>/dev/null; then
              echo "⏭ Docker not installed — skipping monitoring"
              rm -f /tmp/docker-compose.monitoring.yml
              exit 0
            fi
            sudo mkdir -p /opt/monitoring
            sudo mv /tmp/docker-compose.monitoring.yml /opt/monitoring/docker-compose.yml
            cd /opt/monitoring && sudo docker compose up -d

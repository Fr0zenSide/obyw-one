# ║  iOS CD — TestFlight Deploy                                 ║
# ║  Source of truth: obyw-one/templates/ios-cicd/cd-testflight  ║
# ║  Last updated: 2026-03-12                                    ║
# ╚══════════════════════════════════════════════════════════════╝
#
# Copy to: .github/workflows/cd-testflight.yml
#
# Prerequisites:
#   - GitHub Secrets configured (see docs/ios-cicd-blueprint.md)
#   - App Store Connect API key generated
#   - Distribution certificate + provisioning profile exported
#
# Required customization (search for TODO):
#   1. SCHEME / PROJECT_FILE: your build target
#   2. Branch trigger: adjust to your deploy branch
#   3. Export options plist path
#   4. Multi-repo checkout: same as ci.yml

name: CD — TestFlight

on:
  push:
    branches: [develop]              # TODO: adjust deploy branch
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip tests (emergency deploy)"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: cd-testflight
  cancel-in-progress: false          # never cancel a deploy in progress

env:
  # ── Project Config (TODO: customize) ──
  XCODE_VERSION: "16.2"
  SCHEME: "Maya"                     # TODO: your Xcode scheme
  PROJECT_FILE: "MayaFit.xcodeproj"  # TODO: your .xcodeproj
  EXPORT_OPTIONS: "MayaFit/App/exportOptions.plist"  # TODO: path to exportOptions
  APP_NAME: "Maya"                   # TODO: .ipa name (matches PRODUCT_NAME)

  # ── Multi-repo checkout ──
  NEEDS_MONOREPO_CHECKOUT: "true"    # TODO: "true" or "false"

jobs:
  deploy:
    name: Archive & Deploy to TestFlight
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      # ── Checkout (monorepo or simple) ──
      - name: Checkout Shiki packages (sparse)
        if: env.NEEDS_MONOREPO_CHECKOUT == 'true'
        uses: actions/checkout@v4
        with:
          repository: Fr0zenSide/shiki
          token: ${{ secrets.PACKAGES_TOKEN }}
          sparse-checkout: |
            packages/CoreKit
            packages/NetworkKit
            packages/SecurityKit
          sparse-checkout-cone-mode: true
          path: monorepo

      - name: Checkout project
        if: env.NEEDS_MONOREPO_CHECKOUT == 'true'
        uses: actions/checkout@v4
        with:
          path: monorepo/projects/maya      # TODO: adjust subpath

      - name: Checkout Kintsugi DS
        if: env.NEEDS_MONOREPO_CHECKOUT == 'true'
        uses: actions/checkout@v4
        with:
          repository: Fr0zenSide/kintsugi-ds
          token: ${{ secrets.PACKAGES_TOKEN }}
          path: monorepo/projects/kintsugi-ds

      - name: Checkout
        if: env.NEEDS_MONOREPO_CHECKOUT != 'true'
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      # ── Code Signing ──
      - name: Install signing certificate
        env:
          P12_BASE64: ${{ secrets.SIGNING_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── Build ──
      - name: Resolve SPM dependencies
        working-directory: ${{ env.NEEDS_MONOREPO_CHECKOUT == 'true' && 'monorepo/projects/maya' || '.' }}
        run: |
          xcodebuild -project ${{ env.PROJECT_FILE }} \
                     -scheme "${{ env.SCHEME }}" \
                     -resolvePackageDependencies \
                     -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm-cache"

      - name: Archive
        working-directory: ${{ env.NEEDS_MONOREPO_CHECKOUT == 'true' && 'monorepo/projects/maya' || '.' }}
        run: |
          xcodebuild archive \
            -project ${{ env.PROJECT_FILE }} \
            -scheme "${{ env.SCHEME }}" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/${{ env.APP_NAME }}.xcarchive" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm-cache" \
            DEVELOPMENT_TEAM="${{ secrets.DEVELOPMENT_TEAM }}" \
            2>&1 | xcpretty

      - name: Export IPA
        working-directory: ${{ env.NEEDS_MONOREPO_CHECKOUT == 'true' && 'monorepo/projects/maya' || '.' }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/${{ env.APP_NAME }}.xcarchive" \
            -exportOptionsPlist ${{ env.EXPORT_OPTIONS }} \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            2>&1 | xcpretty

      # ── Upload to TestFlight ──
      - name: Install App Store Connect API key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo -n "$ASC_API_KEY_BASE64" | base64 --decode \
            -o ~/.private_keys/AuthKey_${ASC_API_KEY_ID}.p8

      - name: Upload to TestFlight
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -t ios \
            -f "$RUNNER_TEMP/export/${{ env.APP_NAME }}.ipa" \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID" \
            --verbose

      # ── Cleanup ──
      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true
